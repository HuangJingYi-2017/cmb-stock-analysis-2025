var dates = raw.map(function(d){return d[0];});
var ohlc  = raw.map(function(d){return [d[1], d[4], d[3], d[2]];});
var closePrices = raw.map(function(d){return d[4];});
var vols  = raw.map(function(d){return d[5];});

var n = raw.length;

// 均线计算
function calcMA(data, period) {
  var r = [];
  for (var i = 0; i < n; i++) {
    if (i < period - 1) { r.push(null); continue; }
    var sum = 0;
    for (var j = i - period + 1; j <= i; j++) sum += data[j];
    r.push(Math.round(sum / period * 100) / 100);
  }
  return r;
}
var ma5  = calcMA(closePrices, 5);
var ma10 = calcMA(closePrices, 10);
var ma20 = calcMA(closePrices, 20);
var ma60 = calcMA(closePrices, 60);
var volMA5  = calcMA(vols, 5);
var volMA20 = calcMA(vols, 20);

// 统计
var startClose = closePrices[0];
var endClose = closePrices[n-1];
var chgPct = ((endClose - startClose) / startClose * 100).toFixed(2);
var highs = raw.map(function(d){return d[2];});
var lows  = raw.map(function(d){return d[3];});
var maxHigh = Math.max.apply(null, highs);
var minLow  = Math.min.apply(null, lows);
var maxHighDate = dates[highs.indexOf(maxHigh)];
var minLowDate  = dates[lows.indexOf(minLow)];
var avgVol = Math.round(vols.reduce(function(a,b){return a+b;},0) / n);

// 涨跌颜色
var upColor = '#e83939', downColor = '#19a55e';
var volColors = ohlc.map(function(d){return d[1] >= d[0] ? upColor : downColor;});

// ====== 头部统计 ======

  '<div class="stat-item"><div class="label">数据区间</div><div class="value" style="font-size:13px;">2025-07-03 ~ 2026-07-03</div></div>' +
  '<div class="stat-item"><div class="label">交易日</div><div class="value" style="font-size:16px;">' + n + ' 天</div></div>' +
  '<div class="stat-item"><div class="label">起始收盘</div><div class="value">¥' + startClose.toFixed(2) + '</div></div>' +
  '<div class="stat-item"><div class="label">最新收盘</div><div class="value ' + (chgPct >= 0 ? 'red' : 'green') + '">¥' + endClose.toFixed(2) + '</div></div>' +
  '<div class="stat-item"><div class="label">区间涨跌</div><div class="value ' + (chgPct >= 0 ? 'red' : 'green') + '">' + (chgPct >= 0 ? '+' : '') + chgPct + '%</div></div>' +
  '<div class="stat-item"><div class="label">最高</div><div class="value red" style="font-size:15px;">¥' + maxHigh.toFixed(2) + '<div class="sub">' + maxHighDate + '</div></div></div>' +
  '<div class="stat-item"><div class="label">最低</div><div class="value green" style="font-size:15px;">¥' + minLow.toFixed(2) + '<div class="sub">' + minLowDate + '</div></div></div>' +
  '<div class="stat-item"><div class="label">日均成交量</div><div class="value" style="font-size:15px;">' + (avgVol/10000).toFixed(0) + ' 万手</div></div>';

// ====== MA 切换按钮 ======
var maKeys = ['MA5','MA10','MA20','MA60'];
var maColors = {MA5:'#f5a623', MA10:'#4a90d9', MA20:'#9b59b6', MA60:'#e67e22'};
var maActive = {MA5:true, MA10:true, MA20:true, MA60:true};

var btnHtml = '';
maKeys.forEach(function(k){
  btnHtml += '<button class="btn-sm active" data-ma="' + k + '" onclick="toggleMA(\'' + k + '\')">' + k + '</button>';
});
document.getElementById('maToggles').innerHTML = btnHtml;

// ====== 共享 X 轴 & dataZoom ======
var xAxisCfg = {
  type: 'category', data: dates,
  axisLabel: { formatter: function(v){ return v.slice(5); }, fontSize: 10 },
  axisLine: { lineStyle: { color: '#ddd' } },
  axisTick: { alignWithLabel: true }
};
var zoomCfg = [
  { type: 'inside', start: 60, end: 100 },
  { type: 'slider', start: 60, end: 100, height: 22, bottom: 6,
    borderColor: '#eee', fillerColor: 'rgba(26,41,66,0.08)',
    handleStyle: { color: '#1a2942' } }
];

// ====== K 线图 ======
var klineChart = echarts.init(document.getElementById('klineChart'));

function buildMASeries() {
  var dataMap = {MA5: ma5, MA10: ma10, MA20: ma20, MA60: ma60};
  var series = [];
  maKeys.forEach(function(k){
    series.push({
      name: k, type: 'line', data: dataMap[k],
      smooth: true, symbol: 'none',
      lineStyle: { width: 1.2, color: maColors[k] },
      visible: maActive[k]
    });
  });
  return series;
}

function updateKline() {
  var series = [{
    name: '日K', type: 'candlestick', data: ohlc,
    itemStyle: { color: upColor, color0: downColor, borderColor: upColor, borderColor0: downColor }
  }].concat(buildMASeries());

  klineChart.setOption({
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'cross' },
      formatter: function(ps){
        var d = ps[0].axisValue, h = '<strong>' + d + '</strong><br/>';
        ps.forEach(function(p){
          if (p.seriesName === '日K' && p.data && p.data.length >= 4) {
            var v = p.data, c = ((v[1] - v[0]) / v[0] * 100).toFixed(2);
            var clr = c >= 0 ? upColor : downColor;
            h += '开: ' + v[0].toFixed(2) + ' 收: <span style="color:' + clr + ';font-weight:700">' + v[1].toFixed(2) + '</span><br/>';
            h += '低: ' + v[2].toFixed(2) + ' 高: ' + v[3].toFixed(2) + ' (' + (c>=0?'+':'') + c + '%)<br/>';
          } else if (p.value != null) {
            h += p.seriesName + ': ' + p.value.toFixed(2) + '<br/>';
          }
        });
        return h;
      }
    },
    legend: { data: ['日K'].concat(maKeys), bottom: 0, itemWidth: 14, itemHeight: 8, textStyle: { fontSize: 11 } },
    grid: { left: '6%', right: '3%', top: '3%', height: '65%' },
    xAxis: xAxisCfg,
    yAxis: { scale: true, splitLine: { lineStyle: { color: '#f5f5f5' } },
      axisLabel: { formatter: '¥{value}' } },
    dataZoom: zoomCfg,
    series: series
  });
}
updateKline();

// ====== 成交量图 ======
var volChart = echarts.init(document.getElementById('volumeChart'));
volChart.setOption({
  tooltip: {
    trigger: 'axis',
    formatter: function(ps){
      var v = ps[0].value;
      return '<strong>' + ps[0].axisValue + '</strong><br/>成交量: ' + (v/10000).toFixed(2) + ' 万手';
    }
  },
  grid: { left: '6%', right: '3%', top: '8%', height: '65%' },
  xAxis: xAxisCfg,
  yAxis: {
    scale: true, splitLine: { lineStyle: { color: '#f5f5f5' } },
    axisLabel: { formatter: function(v){ return (v/10000).toFixed(0) + '万'; } }
  },
  dataZoom: zoomCfg,
  series: [
    {
      type: 'bar', name: '成交量',
      data: vols.map(function(v,i){ return { value: v, itemStyle: { color: volColors[i] } }; })
    },
    {
      name: 'VOL MA5', type: 'line', data: volMA5,
      smooth: true, symbol: 'none',
      lineStyle: { width: 1, color: '#f5a623' }
    },
    {
      name: 'VOL MA20', type: 'line', data: volMA20,
      smooth: true, symbol: 'none',
      lineStyle: { width: 1, color: '#9b59b6' }
    }
  ]
});

// ====== MA 切换 ======
window.toggleMA = function(ma) {
  maActive[ma] = !maActive[ma];
  var btn = document.querySelector('[data-ma="' + ma + '"]');
  if (maActive[ma]) { btn.classList.add('active'); }
  else { btn.classList.remove('active'); }
  updateKline();
};

// ====== 联动缩放 ======
klineChart.on('dataZoom', function(params){
  var opt = volChart.getOption();
  opt.dataZoom[0].start = params.start;
  opt.dataZoom[0].end = params.end;
  opt.dataZoom[1].start = params.start;
  opt.dataZoom[1].end = params.end;
  volChart.setOption(opt);
});
volChart.on('dataZoom', function(params){
  var opt = klineChart.getOption();
  opt.dataZoom[0].start = params.start;
  opt.dataZoom[0].end = params.end;
  opt.dataZoom[1].start = params.start;
  opt.dataZoom[1].end = params.end;
  klineChart.setOption(opt);
});

// ====== 响应式 ======
window.addEventListener('resize', function(){
  klineChart.resize(); volChart.resize();
});
