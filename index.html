<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招商银行 (600036.SH) 2025年股票数据分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }

/* Header */
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 28px 40px; position: relative; overflow: hidden; }
.header::after { content: ''; position: absolute; top: -50%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%); border-radius: 50%; }
.header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; position: relative; z-index: 1; }
.header .sub { font-size: 13px; opacity: 0.7; position: relative; z-index: 1; }

/* Container */
.container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

/* Section */
.section { margin: 20px 0; }
.section-title { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; padding-left: 12px; border-left: 4px solid #1a1a2e; }

/* Cards */
.card { background: #fff; border-radius: 10px; padding: 20px 24px; border: 1px solid #e8e8e8; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }

/* Company info grid */
.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.info-item { background: #fafbfc; border-radius: 8px; padding: 14px 16px; border: 1px solid #eee; }
.info-item .label { font-size: 11px; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.info-item .value { font-size: 15px; font-weight: 600; color: #1a1a2e; }

/* Stats row */
.stats-row { display: flex; gap: 14px; flex-wrap: wrap; }
.stat-card { flex: 1; min-width: 130px; padding: 16px; background: #fafbfc; border-radius: 8px; border: 1px solid #eee; text-align: center; }
.stat-card .label { font-size: 11px; color: #888; margin-bottom: 6px; }
.stat-card .value { font-size: 20px; font-weight: 700; color: #1a1a2e; }
.stat-card .value.up { color: #e83939; }
.stat-card .value.down { color: #19a55e; }
.stat-card .sub { font-size: 11px; color: #999; margin-top: 2px; }

/* Diagnostic box */
.diagnostic { background: #f8fafb; border-left: 4px solid #1a1a2e; border-radius: 6px; padding: 16px 20px; margin-top: 12px; }
.diagnostic .diag-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; color: #1a1a2e; }
.diagnostic .diag-row { font-size: 13px; padding: 3px 0; color: #555; display: flex; align-items: center; gap: 8px; }
.diagnostic .diag-ok { color: #19a55e; font-weight: 600; }
.diagnostic .diag-warn { color: #e67e22; font-weight: 600; }
.diagnostic .diag-conclusion { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 13px; color: #333; line-height: 1.7; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: -1px; position: relative; z-index: 2; }
.tab-btn { padding: 10px 22px; border: 1px solid #ddd; border-bottom: none; background: #eee; cursor: pointer; font-size: 13px; color: #666; border-radius: 8px 8px 0 0; margin-right: 2px; transition: all 0.15s; }
.tab-btn:hover { background: #f0f0f0; }
.tab-btn.active { background: #fff; color: #1a1a2e; font-weight: 700; border-color: #ccc; }

/* Chart box */
.chart-box { background: #fff; border: 1px solid #e8e8e8; border-top: 3px solid #1a1a2e; border-radius: 0 8px 8px 8px; overflow: hidden; }
.chart-wrap { padding: 10px; position: relative; }
.chart-canvas { width: 100%; height: 450px; }
.chart-explain { padding: 10px 20px 14px; font-size: 12px; color: #888; line-height: 1.6; background: #fafbfc; border-top: 1px solid #f0f0f0; }

/* Summary */
.summary { line-height: 1.9; font-size: 14px; color: #444; }
.summary ul { padding-left: 20px; }
.summary li { margin-bottom: 4px; }
.summary .highlight { color: #1a1a2e; font-weight: 600; }

/* Footer */
.footer { text-align: center; padding: 24px 20px 32px; font-size: 12px; color: #aaa; }
.footer a { color: #888; text-decoration: none; }

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }
.spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #e0e0e0; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 20px; }
  .header h1 { font-size: 20px; }
  .container { padding: 0 10px; }
  .tab-btn { padding: 8px 12px; font-size: 12px; }
  .chart-canvas { height: 320px; }
  .stat-card { min-width: 100px; }
  .stat-card .value { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>招商银行 600036.SH — 2025 年股票数据分析</h1>
  <div class="sub">China Merchants Bank · 上海证券交易所 · 银行板块 · 量化技术指标分析</div>
</div>

<div class="container">

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>正在加载数据并计算技术指标...</div>
  </div>

  <!-- Main content (hidden until data loaded) -->
  <div id="main-content" style="display:none;">

    <!-- Section 1: Company Info -->
    <div class="section">
      <div class="section-title">基本信息</div>
      <div class="card">
        <div class="info-grid">
          <div class="info-item"><div class="label">股票名称</div><div class="value">招商银行</div></div>
          <div class="info-item"><div class="label">股票代码</div><div class="value">600036.SH</div></div>
          <div class="info-item"><div class="label">上市交易所</div><div class="value">上海证券交易所 (SSE)</div></div>
          <div class="info-item"><div class="label">所属行业</div><div class="value">银行</div></div>
          <div class="info-item"><div class="label">市场板块</div><div class="value">主板</div></div>
          <div class="info-item"><div class="label">上市日期</div><div class="value">2002-04-09</div></div>
        </div>
      </div>
    </div>

    <!-- Section 2: Price Overview -->
    <div class="section">
      <div class="section-title">2025 年股价数据概览</div>
      <div class="card">
        <div class="stats-row" id="stats-row"></div>
      </div>
    </div>

    <!-- Section 3: Data Diagnostics -->
    <div class="section">
      <div class="section-title">数据诊断</div>
      <div class="card">
        <div class="stats-row" id="diag-stats"></div>
        <div class="diagnostic" id="diag-conclusion"></div>
      </div>
    </div>

    <!-- Section 4: Charts -->
    <div class="section">
      <div class="section-title">技术指标图表</div>
      <div class="tabs" id="chart-tabs">
        <button class="tab-btn active" data-tab="close">收盘价 &amp; MA 均线</button>
        <button class="tab-btn" data-tab="rsi">RSI 相对强弱</button>
        <button class="tab-btn" data-tab="macd">MACD 指标</button>
        <button class="tab-btn" data-tab="boll">布林带 Bollinger</button>
      </div>
      <div class="chart-box">
        <div class="chart-wrap">
          <div id="chart-close" class="chart-canvas"></div>
          <div id="chart-rsi" class="chart-canvas" style="display:none;"></div>
          <div id="chart-macd" class="chart-canvas" style="display:none;"></div>
          <div id="chart-boll" class="chart-canvas" style="display:none;"></div>
        </div>
        <div class="chart-explain" id="chart-explain"></div>
      </div>
    </div>

    <!-- Section 5: Summary -->
    <div class="section">
      <div class="section-title">分析小结</div>
      <div class="card summary" id="summary"></div>
    </div>

  </div>

  <div class="footer">
    数据来源: Tushare Pro &middot; 仅供学习参考，不构成任何投资建议 &middot; 更新于 <span id="update-date">---</span>
  </div>
</div>

<script>
// ============================================================
// Global state
// ============================================================
var rawData = [];
var charts = {};
var currentTab = 'close';

// ============================================================
// Utility functions
// ============================================================
function fmtVol(v) { return (v / 10000).toFixed(0) + ' 万手'; }

// ============================================================
// Data Processing (使用 Python 预计算的指标)
// ============================================================
function processData(raw) {
  var dates = [], closes = [], opens = [], highs = [], lows = [], vols = [], amounts = [], ohlc = [];
  // 预计算指标数组
  var ma5 = [], ma10 = [], ma20 = [];
  var rsiArr = [];
  var difArr = [], deaArr = [], macdArr = [];
  var bbU = [], bbM = [], bbL = [];

  raw.forEach(function(r) {
    dates.push(r.d);
    closes.push(r.c);
    opens.push(r.o);
    highs.push(r.h);
    lows.push(r.l);
    vols.push(r.v);
    amounts.push(r.amt);
    ohlc.push([r.o, r.c, r.l, r.h]);
    // 读取 Python 预计算指标
    ma5.push(r.ma5  != null ? Math.round(r.ma5  * 100) / 100 : null);
    ma10.push(r.ma10 != null ? Math.round(r.ma10 * 100) / 100 : null);
    ma20.push(r.ma20 != null ? Math.round(r.ma20 * 100) / 100 : null);
    rsiArr.push(r.rsi  != null ? Math.round(r.rsi  * 100) / 100 : null);
    difArr.push(r.dif  != null ? Math.round(r.dif  * 10000) / 10000 : null);
    deaArr.push(r.dea  != null ? Math.round(r.dea  * 10000) / 10000 : null);
    macdArr.push(r.macd != null ? Math.round(r.macd * 10000) / 10000 : null);
    bbU.push(r.bb_u  != null ? Math.round(r.bb_u * 100) / 100 : null);
    bbM.push(r.bb_m  != null ? Math.round(r.bb_m * 100) / 100 : null);
    bbL.push(r.bb_l  != null ? Math.round(r.bb_l * 100) / 100 : null);
  });

  // Color arrays
  var volColors = [];
  var changeColors = [];
  for (var i = 0; i < closes.length; i++) {
    // vol color: red if close >= open (yang), green if close < open (yin)
    volColors.push(closes[i] >= opens[i] ? '#e83939' : '#19a55e');
    // price change color
    if (i === 0) changeColors.push('#e83939');
    else changeColors.push(closes[i] >= closes[i-1] ? '#e83939' : '#19a55e');
  }

  // Statistics
  var closeMax = Math.max.apply(null, closes);
  var closeMin = Math.min.apply(null, closes);
  var highMax = Math.max.apply(null, highs);
  var lowMin = Math.min.apply(null, lows);
  var closeSum = closes.reduce(function(a,b) { return a+b; }, 0);
  var closeAvg = closeSum / closes.length;
  var volSum = vols.reduce(function(a,b) { return a+b; }, 0);
  var volAvg = volSum / vols.length;

  // Max/Min close dates
  var maxIdx = closes.indexOf(closeMax);
  var minIdx = closes.indexOf(closeMin);

  // Change calculation
  var firstClose = closes[0];
  var lastClose = closes[closes.length - 1];
  var totalChange = ((lastClose - firstClose) / firstClose * 100);

  return {
    dates: dates,
    closes: closes,
    opens: opens,
    highs: highs,
    lows: lows,
    vols: vols,
    amounts: amounts,
    ohlc: ohlc,
    ma5: ma5, ma10: ma10, ma20: ma20,
    rsi: rsiArr,
    macd: { dif: difArr, dea: deaArr, macd: macdArr },
    boll: { middle: bbM, upper: bbU, lower: bbL },
    volColors: volColors,
    changeColors: changeColors,
    stats: {
      count: closes.length,
      dateStart: dates[0],
      dateEnd: dates[dates.length - 1],
      closeMax: closeMax, closeMaxDate: dates[maxIdx],
      closeMin: closeMin, closeMinDate: dates[minIdx],
      closeAvg: closeAvg,
      highMax: highMax,
      lowMin: lowMin,
      volAvg: volAvg,
      firstClose: firstClose,
      lastClose: lastClose,
      totalChange: totalChange
    }
  };
}

// ============================================================
// Render UI
// ============================================================
function renderStats(data) {
  var s = data.stats;
  var chgClass = s.totalChange >= 0 ? 'up' : 'down';
  var chgSign = s.totalChange >= 0 ? '+' : '';

  document.getElementById('stats-row').innerHTML =
    '<div class="stat-card"><div class="label">交易日</div><div class="value">' + s.count + ' 天</div></div>' +
    '<div class="stat-card"><div class="label">日期范围</div><div class="value" style="font-size:14px;">' + s.dateStart + ' ~ ' + s.dateEnd + '</div></div>' +
    '<div class="stat-card"><div class="label">年初收盘</div><div class="value">' + s.firstClose.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="label">年末收盘</div><div class="value ' + chgClass + '">' + s.lastClose.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="label">年度涨跌</div><div class="value ' + chgClass + '">' + chgSign + s.totalChange.toFixed(2) + '%</div></div>' +
    '<div class="stat-card"><div class="label">最高价 / 最低价</div><div class="value" style="font-size:14px;">' + s.highMax.toFixed(2) + ' / ' + s.lowMin.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="label">最高收盘 / 最低收盘</div><div class="value" style="font-size:14px;">' + s.closeMax.toFixed(2) + ' / ' + s.closeMin.toFixed(2) + '</div><div class="sub">' + s.closeMaxDate + ' / ' + s.closeMinDate + '</div></div>' +
    '<div class="stat-card"><div class="label">日均成交量</div><div class="value" style="font-size:14px;">' + fmtVol(s.volAvg) + '</div></div>';
}

function renderDiagnostics(data) {
  var s = data.stats;

  // Diagnostic metrics
  var totalDays = 365;
  var tradingPct = (s.count / totalDays * 100).toFixed(1);
  var closeMedian = median(data.closes);
  var closeStd = Math.round(stdDev(data.closes) * 100) / 100;
  var amtSum = data.amounts.reduce(function(a,b) { return a+b; }, 0);
  var amtAvg = amtSum / s.count;

  document.getElementById('diag-stats').innerHTML =
    '<div class="stat-card"><div class="label">缺失值</div><div class="value" style="color:#19a55e;">0</div></div>' +
    '<div class="stat-card"><div class="label">重复日期</div><div class="value" style="color:#19a55e;">0</div></div>' +
    '<div class="stat-card"><div class="label">交易占比</div><div class="value">' + tradingPct + '%</div><div class="sub">243 / 365 天</div></div>' +
    '<div class="stat-card"><div class="label">收盘价均值</div><div class="value">' + s.closeAvg.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="label">收盘价中位数</div><div class="value">' + closeMedian.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="label">收盘价标准差</div><div class="value">' + closeStd.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="label">日均成交额</div><div class="value" style="font-size:13px;">' + (amtAvg / 10000).toFixed(0) + ' 万元</div></div>' +
    '<div class="stat-card"><div class="label">年度总成交额</div><div class="value" style="font-size:13px;">' + (amtSum / 100000000).toFixed(1) + ' 亿</div></div>';

  document.getElementById('diag-conclusion').innerHTML =
    '<div class="diag-title">诊断结论</div>' +
    '<div class="diag-row"><span class="diag-ok">✓</span> 缺失值检查: <b>0 个缺失值</b>，所有字段 (开盘/最高/最低/收盘/前收盘/涨跌幅/成交量/成交额) 数据完整，数据质量优秀。</div>' +
    '<div class="diag-row"><span class="diag-ok">✓</span> 重复值检查: <b>无重复日期</b>，每个交易日仅一条唯一记录。</div>' +
    '<div class="diag-row"><span class="diag-ok">✓</span> 异常值检查: 未发现负价格、零价格或价格逻辑错误（所有记录 high ≥ low）。日内涨跌幅均在正常范围内。</div>' +
    '<div class="diag-row"><span class="diag-ok">✓</span> 日期连续性: 全年 365 天中共覆盖 <b>243 个交易日</b>。周末及法定节假日（春节 1.28-2.4、劳动节、国庆节等）休市导致的间隔属正常现象，不影响指标计算。</div>' +
    '<div class="diag-conclusion">综合评定：数据的<span style="color:#19a55e;font-weight:700;">完整性、准确性和一致性均满足要求</span>，可以直接用于 RSI、MACD、布林带等技术指标的计算和分析。<br>成交量单位说明：Tushare <code>vol</code> 字段单位为"手"，A 股 1 手 = 100 股。</div>';
}

function renderSummary(data) {
  var s = data.stats;
  var rsiVals = data.rsi.filter(function(v) { return v !== null; });
  var lastRSI = rsiVals[rsiVals.length - 1];
  var rsiMax = Math.max.apply(null, rsiVals);
  var rsiMin = Math.min.apply(null, rsiVals);
  var rsiAvg = (rsiVals.reduce(function(a,b) { return a+b; }, 0) / rsiVals.length).toFixed(1);

  var macdLast = null, macdCross = '';
  for (var i = data.macd.dif.length - 1; i >= 0; i--) {
    if (data.macd.dif[i] !== null && data.macd.dea[i] !== null) {
      macdLast = { dif: data.macd.dif[i], dea: data.macd.dea[i], macd: data.macd.macd[i], idx: i };
      break;
    }
  }
  if (macdLast) {
    macdCross = macdLast.dif > macdLast.dea ? 'DIF 位于 DEA 上方' : 'DIF 位于 DEA 下方';
    macdCross += macdLast.macd > 0 ? '，MACD 柱为正值' : '，MACD 柱为负值';
  }

  var lastClose = s.lastClose;
  var bollMid = null, bollUpper = null, bollLower = null;
  for (var i = data.boll.middle.length - 1; i >= 0; i--) {
    if (data.boll.middle[i] !== null) {
      bollMid = data.boll.middle[i];
      bollUpper = data.boll.upper[i];
      bollLower = data.boll.lower[i];
      break;
    }
  }
  var bollPos = '';
  if (bollMid) {
    var bw = ((bollUpper - bollLower) / bollMid * 100).toFixed(1);
    if (lastClose > bollUpper) bollPos = '收盘价突破布林带上轨（' + bollUpper.toFixed(2) + '）';
    else if (lastClose < bollLower) bollPos = '收盘价跌破布林带下轨（' + bollLower.toFixed(2) + '）';
    else bollPos = '收盘价位于布林带通道内，带宽 ' + bw + '%';
  }

  var html = '<p>基于招商银行 600036.SH 2025 年度日线数据（' + s.count + ' 个交易日），经过数据清洗和技术指标计算，概况如下：</p>';
  html += '<ul>';
  html += '<li><span class="highlight">价格走势：</span>2025 年开盘价 ¥' + s.firstClose.toFixed(2) + '，收盘价 ¥' + s.lastClose.toFixed(2) + '，全年涨跌幅 ' + (s.totalChange >= 0 ? '+' : '') + s.totalChange.toFixed(2) + '%。最高收盘出现在 ' + s.closeMaxDate + '（¥' + s.closeMax.toFixed(2) + '），最低收盘出现在 ' + s.closeMinDate + '（¥' + s.closeMin.toFixed(2) + '）。';
  html += '<li><span class="highlight">成交量：</span>全年日均成交量约 ' + fmtVol(s.volAvg) + '，总成交额约 ' + (data.amounts.reduce(function(a,b) { return a+b; }, 0) / 100000000).toFixed(0) + ' 亿元。</li>';
  if (lastRSI !== null) {
    var rsiDesc = lastRSI > 70 ? '高于 70（超买区域）' : (lastRSI < 30 ? '低于 30（超卖区域）' : '在 30-70 正常区间内');
    html += '<li><span class="highlight">RSI (14)：</span>年末值为 ' + lastRSI.toFixed(1) + '，' + rsiDesc + '。全年 RSI 波动区间 [' + rsiMin.toFixed(1) + ', ' + rsiMax.toFixed(1) + ']，均值 ' + rsiAvg + '。</li>';
  }
  if (macdLast) {
    html += '<li><span class="highlight">MACD：</span>' + macdCross + '（DIF: ' + macdLast.dif.toFixed(2) + ', DEA: ' + macdLast.dea.toFixed(2) + '）。</li>';
  }
  if (bollMid) {
    html += '<li><span class="highlight">布林带：</span>' + bollPos + '。中轨（MA20）为 ¥' + bollMid.toFixed(2) + '。</li>';
  }
  html += '<li><span class="highlight">均线系统：</span>MA5/MA10/MA20 均线组合可用于观察短期、中期趋势方向及均线交叉信号。</li>';
  html += '</ul>';
  html += '<p style="margin-top:10px;color:#888;font-size:12px;">※ 以上内容为基于历史数据的客观统计与技术指标呈现，不构成任何形式的投资建议。指标仅反映过去的价格和成交量信息，不代表未来走势。</p>';

  document.getElementById('summary').innerHTML = html;
}

function median(arr) {
  var sorted = arr.slice().sort(function(a,b) { return a-b; });
  var mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2;
}

function stdDev(arr) {
  var mean = arr.reduce(function(a,b) { return a+b; }, 0) / arr.length;
  return Math.sqrt(arr.reduce(function(sq, n) { return sq + Math.pow(n - mean, 2); }, 0) / arr.length);
}

// ============================================================
// Chart Rendering
// ============================================================

var commonGrid = { left: 60, right: 30, top: 20, bottom: 40 };
var commonX = {
  type: 'category',
  data: [],
  axisLabel: { formatter: function(v) { if (!v) return ''; return v.slice(5); }, fontSize: 10 },
  axisLine: { lineStyle: { color: '#ccc' } }
};
var commonZoom = [
  { type: 'inside', start: 0, end: 100 },
  { type: 'slider', start: 0, end: 100, height: 16, bottom: 6 }
];

function initChart(domId) {
  var dom = document.getElementById(domId);
  if (!dom) return null;
  if (charts[domId]) { charts[domId].dispose(); }
  var c = echarts.init(dom);
  charts[domId] = c;
  return c;
}

function renderCloseChart(data) {
  var c = initChart('chart-close');
  if (!c) return;
  var xData = data.dates;

  // Color changes
  var areaColor = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
    { offset: 0, color: 'rgba(26,26,46,0.08)' },
    { offset: 1, color: 'rgba(26,26,46,0.0)' }
  ]);

  c.setOption({
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        if (!params || params.length === 0) return '';
        var html = '<strong>' + params[0].axisValue + '</strong><br/>';
        params.forEach(function(p) {
          if (p.value == null) return;
          if (p.seriesName === '收盘价') {
            var color = params[0].dataIndex > 0 && data.closes[params[0].dataIndex] >= data.closes[params[0].dataIndex - 1] ? '#e83939' : '#19a55e';
            html += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';margin-right:4px;"></span>';
            html += p.seriesName + ': ¥' + p.value.toFixed(2) + '<br/>';
          } else {
            html += '<span style="display:inline-block;width:8px;height:2px;background:' + p.color + ';margin-right:4px;vertical-align:middle;"></span>';
            html += p.seriesName + ': ' + p.value.toFixed(2) + '<br/>';
          }
        });
        return html;
      }
    },
    legend: { data: ['收盘价', 'MA5', 'MA10', 'MA20'], bottom: 2, textStyle: { fontSize: 11 } },
    grid: commonGrid,
    xAxis: Object.assign({}, commonX, { data: xData }),
    yAxis: { scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: '¥{value}' } },
    dataZoom: commonZoom,
    series: [
      {
        name: '收盘价', type: 'line', data: data.closes,
        lineStyle: { width: 1.5, color: '#1a1a2e' },
        areaStyle: { color: areaColor },
        symbol: 'none',
        z: 4,
        markPoint: {
          data: [
            { type: 'max', name: '最高', symbol: 'pin', symbolSize: 36, itemStyle: { color: '#e83939' }, label: { fontSize: 10 } },
            { type: 'min', name: '最低', symbol: 'pin', symbolSize: 36, itemStyle: { color: '#19a55e' }, label: { fontSize: 10 } }
          ]
        }
      },
      { name: 'MA5',  type: 'line', data: data.ma5,  smooth: true, lineStyle: { width: 1, color: '#f5a623', type: 'dashed' }, symbol: 'none', z: 3 },
      { name: 'MA10', type: 'line', data: data.ma10, smooth: true, lineStyle: { width: 1, color: '#4a90d9', type: 'dashed' }, symbol: 'none', z: 3 },
      { name: 'MA20', type: 'line', data: data.ma20, smooth: true, lineStyle: { width: 1.2, color: '#9b59b6', type: 'dashed' }, symbol: 'none', z: 3 }
    ]
  });

  document.getElementById('chart-explain').innerHTML =
    '<b>收盘价曲线</b>为招商银行 2025 年每日收盘价格走势，主图中的实线为每日收盘价。<b>MA5</b>（5日均线）、<b>MA10</b>（10日均线）、<b>MA20</b>（20日均线）为叠加的移动平均辅助线，分别反映短期、中短期和中期价格趋势。均线向上通常表示价格处于上升趋势，均线向下则表示下降趋势。均线之间的交叉关系可用于观察趋势变化。';
}

function renderRSIChart(data) {
  var c = initChart('chart-rsi');
  if (!c) return;
  var xData = data.dates;

  c.setOption({
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        if (!params || params.length === 0) return '';
        var v = params[0].value;
        if (v == null) return '';
        return '<strong>' + params[0].axisValue + '</strong><br/>RSI(14): ' + v.toFixed(2);
      }
    },
    grid: Object.assign({}, commonGrid, { top: 20, bottom: 40 }),
    xAxis: Object.assign({}, commonX, { data: xData }),
    yAxis: {
      min: 0, max: 100,
      splitLine: { lineStyle: { color: '#f0f0f0' } },
      axisLabel: { formatter: '{value}' }
    },
    dataZoom: commonZoom,
    series: [
      {
        name: 'RSI(14)', type: 'line', data: data.rsi,
        lineStyle: { width: 1.5, color: '#7b68ee' },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(123,104,238,0.15)' },
            { offset: 1, color: 'rgba(123,104,238,0.0)' }
          ])
        },
        symbol: 'none',
        markLine: {
          silent: true,
          symbol: 'none',
          lineStyle: { type: 'dashed', width: 1 },
          data: [
            { yAxis: 70, label: { formatter: '超买 70', fontSize: 10 }, lineStyle: { color: '#e83939' } },
            { yAxis: 50, label: { formatter: '50', fontSize: 10 }, lineStyle: { color: '#999' } },
            { yAxis: 30, label: { formatter: '超卖 30', fontSize: 10 }, lineStyle: { color: '#19a55e' } }
          ]
        }
      }
    ]
  });

  document.getElementById('chart-explain').innerHTML =
    '<b>RSI（相对强弱指数）</b>是衡量价格变动速度和幅度的动量指标，取值范围 0-100。通常 <b>RSI > 70</b> 表示价格处于超买状态（上涨过快），<b>RSI < 30</b> 表示价格处于超卖状态（下跌过快），50 为中轴线。RSI 不直接产生交易信号，而是帮助判断当前市场的强弱程度。';
}

function renderMACDChart(data) {
  var c = initChart('chart-macd');
  if (!c) return;
  var xData = data.dates;

  // Color bars: red positive, green negative
  var macdColors = data.macd.macd.map(function(v) {
    if (v == null) return 'transparent';
    return v >= 0 ? '#e83939' : '#19a55e';
  });

  c.setOption({
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        if (!params || params.length === 0) return '';
        var d = params[0].axisValue;
        var html = '<strong>' + d + '</strong><br/>';
        params.forEach(function(p) {
          if (p.value == null) return;
          html += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + p.color + ';margin-right:4px;"></span>';
          html += p.seriesName + ': ' + p.value.toFixed(3) + '<br/>';
        });
        return html;
      }
    },
    legend: { data: ['DIF', 'DEA', 'MACD柱'], bottom: 2, textStyle: { fontSize: 11 } },
    grid: Object.assign({}, commonGrid, { top: 20, bottom: 40 }),
    xAxis: Object.assign({}, commonX, { data: xData }),
    yAxis: { scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } } },
    dataZoom: commonZoom,
    series: [
      {
        name: 'MACD柱', type: 'bar',
        data: data.macd.macd.map(function(v, i) {
          return { value: v, itemStyle: { color: macdColors[i] } };
        }),
        barWidth: '60%'
      },
      { name: 'DIF', type: 'line', data: data.macd.dif, lineStyle: { width: 1.2, color: '#e83939' }, symbol: 'none' },
      { name: 'DEA', type: 'line', data: data.macd.dea, lineStyle: { width: 1.2, color: '#4a90d9' }, symbol: 'none' }
    ]
  });

  document.getElementById('chart-explain').innerHTML =
    '<b>MACD（指数平滑异同移动平均线）</b>由三部分组成：<b>DIF</b>（快线，EMA12 - EMA26）反映短期与长期趋势的偏离；<b>DEA</b>（慢线，DIF 的 9 日 EMA）对 DIF 进行平滑；<b>MACD 柱</b>（DIF - DEA）表示两者之差。DIF 上穿 DEA 时 MACD 柱由绿转红，DIF 下穿 DEA 时 MACD 柱由红转绿。MACD 是趋势跟踪指标，反映价格动量的变化。';
}

function renderBollChart(data) {
  var c = initChart('chart-boll');
  if (!c) return;
  var xData = data.dates;

  c.setOption({
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        if (!params || params.length === 0) return '';
        var html = '<strong>' + params[0].axisValue + '</strong><br/>';
        params.forEach(function(p) {
          if (p.value == null) return;
          html += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + p.color + ';margin-right:4px;"></span>';
          html += p.seriesName + ': ¥' + p.value.toFixed(2) + '<br/>';
        });
        return html;
      }
    },
    legend: { data: ['收盘价', '上轨', '中轨(MA20)', '下轨'], bottom: 2, textStyle: { fontSize: 11 } },
    grid: commonGrid,
    xAxis: Object.assign({}, commonX, { data: xData }),
    yAxis: { scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: '¥{value}' } },
    dataZoom: commonZoom,
    series: [
      {
        name: '上轨', type: 'line', data: data.boll.upper,
        lineStyle: { width: 1, color: 'rgba(232,57,57,0.4)', type: 'dashed' },
        symbol: 'none',
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(128,128,128,0.03)' },
            { offset: 1, color: 'rgba(128,128,128,0.03)' }
          ])
        },
        z: 1
      },
      {
        name: '下轨', type: 'line', data: data.boll.lower,
        lineStyle: { width: 1, color: 'rgba(25,165,94,0.4)', type: 'dashed' },
        symbol: 'none',
        areaStyle: { color: 'rgba(255,255,255,0.8)' },
        z: 1
      },
      { name: '中轨(MA20)', type: 'line', data: data.boll.middle, lineStyle: { width: 1, color: '#ff9800' }, symbol: 'none', z: 3 },
      {
        name: '收盘价', type: 'line', data: data.closes,
        lineStyle: { width: 1.5, color: '#1a1a2e' },
        symbol: 'none',
        z: 4
      }
    ]
  });

  document.getElementById('chart-explain').innerHTML =
    '<b>布林带（Bollinger Bands）</b>由三条线组成：<b>中轨</b>为 20 日简单移动平均线（SMA20），<b>上轨</b>和<b>下轨</b>分别为中轨加减 2 倍标准差。布林带反映价格的波动范围：带宽变窄表示波动率降低（可能酝酿变盘），带宽变宽表示波动率加大。价格触及或突破上下轨时，表明价格处于相对极端位置。';
}

function switchTab(tab) {
  currentTab = tab;
  var tabs = ['close', 'rsi', 'macd', 'boll'];
  tabs.forEach(function(t) {
    var el = document.getElementById('chart-' + t);
    if (el) el.style.display = t === tab ? '' : 'none';
  });
  var btns = document.querySelectorAll('#chart-tabs .tab-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  var activeBtn = document.querySelector('#chart-tabs [data-tab="' + tab + '"]');
  if (activeBtn) activeBtn.classList.add('active');

  // Render chart on demand (lazy init)
  if (tab === 'close') renderCloseChart(processedData);
  else if (tab === 'rsi') renderRSIChart(processedData);
  else if (tab === 'macd') renderMACDChart(processedData);
  else if (tab === 'boll') renderBollChart(processedData);

  setTimeout(function() {
    var key = 'chart-' + tab;
    if (charts[key]) charts[key].resize();
  }, 100);
}

// ============================================================
// Main
// ============================================================
var processedData = null;

// Tab click handlers
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('#chart-tabs .tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tab = this.getAttribute('data-tab');
      if (tab) switchTab(tab);
    });
  });
});

// Load data and render
fetch('data/cmb_2025_compact.json')
  .then(function(resp) {
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  })
  .then(function(json) {
    rawData = json;
    processedData = processData(rawData);

    // Render UI
    renderStats(processedData);
    renderDiagnostics(processedData);
    renderSummary(processedData);

    // Show main content
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-content').style.display = '';

    // Render initial chart
    switchTab('close');

    // Update date
    document.getElementById('update-date').textContent = new Date().toISOString().slice(0, 10);

    // Window resize
    window.addEventListener('resize', function() {
      for (var k in charts) {
        if (charts[k]) charts[k].resize();
      }
    });
  })
  .catch(function(err) {
    document.getElementById('loading').innerHTML = '<div style="color:#e83939;font-size:16px;">⚠ 数据加载失败</div><div style="margin-top:8px;color:#888;">请确认 data/cmb_2025_compact.json 文件存在<br/>错误信息: ' + err.message + '</div>';
  });
</script>
