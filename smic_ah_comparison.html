  let c=ic('c-compare');
  c.setOption({grid:{left:'8%',right:'4%',top:25,bottom:28},xAxis:ax(ads),
    yAxis:{type:'value',axisLabel:{color:'#8892b0',fontSize:10,formatter:v=>v+'%'},splitLine:{lineStyle:{color:'#2a2a4a'}},scale:true},
    series:[
      {name:'A股(688981)',type:'line',data:aN,smooth:false,symbol:'none',lineStyle:{color:'#ef5350',width:2}},
      {name:'H股(00981)',type:'line',data:hN,smooth:false,symbol:'none',lineStyle:{color:'#2196f3',width:2}}
    ],
    tooltip:{trigger:'axis',backgroundColor:'rgba(22,33,62,0.95)',borderColor:'#3a3a5c',textStyle:{color:'#ccd6f6',fontSize:12},
      formatter:ps=>{let h='<b>'+fd(ps[0].name)+'</b>';for(let p of ps)h+='<br/><span style=color:'+(p.seriesName.startsWith('A')?'#ef5350':'#2196f3')+'>'+p.seriesName+': <b>'+p.value.toFixed(2)+'%</b></span>';return h}},
    legend:{data:['A股(688981)','H股(00981)'],textStyle:{color:'#8892b0',fontSize:11},top:0,right:10},
    dataZoom:[{type:'inside',start:50,end:100},{type:'slider',start:50,end:100,height:18,bottom:6,borderColor:'#3a3a5c',textStyle:{color:'#8892b0'},handleStyle:{color:'#0f3460'}}]
  });}
function ud(p){
  let[ads,ac_,ao_,ah_,al_]=sl(aD,[aC,aO,aH,aL],p);
  let[hds,hc_,ho_,hh_,hl_]=sl(hD,[hC,hO,hH,hL],p);
  function mk(ds,o,c,l,h){return ds.map((_,i)=>[o[i],c[i],l[i],h[i]])}
  let o={grid:{left:'10%',right:'4%',top:10,bottom:28},xAxis:null,yAxis:{type:'value',scale:true,axisLabel:{color:'#8892b0',fontSize:10},splitLine:{lineStyle:{color:'#2a2a4a'}}},
    series:[{type:'candlestick',data:[],itemStyle:{color:'#ef5350',color0:'#26a69a',borderColor:'#ef5350',borderColor0:'#26a69a'}}],
    tooltip:{trigger:'axis',backgroundColor:'rgba(22,33,62,0.95)',borderColor:'#3a3a5c',textStyle:{color:'#ccd6f6',fontSize:12},
      formatter:ps=>{let v=ps[0].value;if(!v||v.length<4)return fd(ps[0].name);let up=v[1]>=v[0],c=up?'#ef5350':'#26a69a';return'<b>'+fd(ps[0].name)+'</b><br/>'+'O:<b style=color:'+c+'>'+v[0].toFixed(2)+'</b> C:<b style=color:'+c+'>'+v[1].toFixed(2)+'</b><br/>H:'+v[3].toFixed(2)+' L:'+v[2].toFixed(2)}},
    dataZoom:[{type:'inside',start:50,end:100}]
  };
  let ca=ic('c-a'),ch=ic('c-h');
  o.xAxis=ax(ads);o.series[0].data=mk(ads,ao_,ac_,al_,ah_);ca.setOption(JSON.parse(JSON.stringify(o)));
  o.xAxis=ax(hds);o.series[0].data=mk(hds,ho_,hc_,hl_,hh_);ch.setOption(JSON.parse(JSON.stringify(o)));}
function uv(p){
  let[ads,ac_,ao_]=sl(aD,[aC,aO],p);
  let[hds,hc_,ho_]=sl(hD,[hC,hO],p);
  let c=ic('c-vol');
  c.setOption({grid:{left:'8%',right:'4%',top:25,bottom:28},xAxis:ax(ads),
    yAxis:[
      {type:'value',name:'A股(手)',nameTextStyle:{color:'#ef5350',fontSize:10},axisLabel:{color:'#8892b0',fontSize:10,formatter:v=>(v/10000).toFixed(0)+'W'},splitLine:{lineStyle:{color:'#2a2a4a'}}},
      {type:'value',name:'H股(股)',nameTextStyle:{color:'#2196f3',fontSize:10},axisLabel:{color:'#8892b0',fontSize:10,formatter:v=>(v/1e6).toFixed(0)+'M'},splitLine:{show:false}}
    ],
    series:[
      {name:'A股成交',type:'bar',data:ads.map((d,i)=>{let up=ac_[i]>=ao_[i];return{value:aV[aD.indexOf(d)],itemStyle:{color:up?'rgba(239,83,80,0.6)':'rgba(38,166,154,0.6)'}};})},
      {name:'H股成交',type:'line',yAxisIndex:1,data:hds.map((d,i)=>hV[hD.indexOf(d)]),symbol:'none',lineStyle:{color:'#2196f3',width:1.5}}
    ],
    tooltip:{trigger:'axis',backgroundColor:'rgba(22,33,62,0.95)',borderColor:'#3a3a5c',textStyle:{color:'#ccd6f6',fontSize:12},
      formatter:ps=>{let h='<b>'+fd(ps[0].name)+'</b>';for(let p of ps)h+='<br/><span style=color:'+(p.seriesName==='A股成交'?'#ef5350':'#2196f3')+'>'+p.seriesName+': <b>'+(p.seriesName==='A股成交'?(p.value/1e4).toFixed(0)+'W':(p.value/1e6).toFixed(0)+'M')+'</b></span>';return h}},
    legend:{data:['A股成交','H股成交'],textStyle:{color:'#8892b0',fontSize:11},top:0,right:10},
    dataZoom:[{type:'inside',start:50,end:100},{type:'slider',start:50,end:100,height:18,bottom:6,borderColor:'#3a3a5c',textStyle:{color:'#8892b0'},handleStyle:{color:'#0f3460'}}]
  });}
function setPeriod(p){cp=p;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));event.target.classList.add('on');if(ct==='compare')uc(p);else if(ct==='dual')ud(p);else uv(p)}
function switchTab(t){ct=t;document.querySelectorAll('.tbb').forEach(b=>b.classList.remove('on'));event.target.classList.add('on');document.getElementById('p-compare').style.display=t==='compare'?'block':'none';document.getElementById('p-dual').style.display=t==='dual'?'flex':'none';document.getElementById('p-vol').style.display=t==='vol'?'block':'none';if(t==='compare')uc(cp);else if(t==='dual')ud(cp);else uv(cp);for(let k in chs)chs[k].resize()}
window.onload=()=>{uc('1y')};
window.addEventListener('resize',()=>{for(let k in chs)chs[k].resize()});
</script></body></html>
